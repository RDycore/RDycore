# LETKF twin experiment config for the planar dam break test case.
# Uses the planar_dam_10x5.msh mesh with a short run for testing.

physics:
  flow:
    mode: swe
    source:
      method: implicit_xq2018

numerics:
  spatial: fv
  temporal: euler
  riemann: roe

logging:
  level: warning

time:
  final_time: 0.001
  unit: hours
  max_step: 10000
  coupling_interval: 0.0001

output:
  format: none

grid:
  file: planar_dam_10x5.msh

regions:
  - name: upstream
    grid_region_id: 1
  - name: downstream
    grid_region_id: 2

surface_composition:
  - region: upstream
    material: smooth
  - region: downstream
    material: smooth

materials:
  - name: smooth
    properties:
      manning:
        value: 0.015

initial_conditions:
  - region: upstream
    flow: dam_top_ic
  - region: downstream
    flow: dam_bottom_ic

boundaries:
  - name: boundary
    grid_boundary_id: 1
  - name: top_wall
    grid_boundary_id: 2
  - name: bottom_wall
    grid_boundary_id: 3

boundary_conditions:
  - boundaries: [top_wall]
    flow: reflecting_bc
  - boundaries: [bottom_wall]
    flow: outflow_bc

flow_conditions:
  - name: dam_top_ic
    type: dirichlet
    height: 10
    x_momentum: 0
    y_momentum: 0
  - name: dam_bottom_ic
    type: dirichlet
    height: 5
    x_momentum: 0
    y_momentum: 0
  - name: reflecting_bc
    type: reflecting
  - name: outflow_bc
    type: critical-outflow
