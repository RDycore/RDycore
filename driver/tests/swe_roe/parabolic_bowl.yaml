# This test input corresponds to toy-problems/swe_roe/ex2b.c.

physics:
  flow:
    mode: swe
    source:
      method: implicit_xq2018
    well_balancing: hydrostatic_reconstruction

numerics:
  spatial: fv
  temporal: euler
  riemann: roe

logging:
  level: debug

time:
  stop             : 20.0
  unit             : seconds
  adaptive:
    enable                 : true # false or true. The values below are only used if is enable=true
    target_courant_number  : 0.8  # CFL
    max_increase_factor    : 2    # At max, the dt can be doubled while still allowing CFL be less than 0.8
    initial_time_step      : 5   # initial timestep

output:
  format: xdmf
  output_interval: 100
  batch_size: 20

grid:
  file: parabolic_bowl.exo

regions:
  - name: domain
    grid_region_id: 1

surface_composition:
  - region: domain
    material: smooth

materials:
  - name: smooth
    properties:
      manning:
        value: 0.033

initial_conditions:
  - region: domain
    flow: ic

flow_conditions:
  - name: ic
    type: dirichlet
    file: parabolic_bowl.ic.${PETSC_ID_TYPE}.bin
    format: binary
